services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: supplyed-frontend-local
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:4000}
      AUTH_SECRET: ${AUTH_SECRET:-local-development-secret-change-me}
      AUTH_URL: http://localhost:${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_SITE_URL: http://localhost:${FRONTEND_PORT:-3000}
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:

