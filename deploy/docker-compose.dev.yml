services:
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set}
    container_name: supplyed-frontend-dev
    restart: unless-stopped
    env_file:
      - .env.runtime
    environment:
      HOSTNAME: ${FRONTEND_BIND_ADDRESS:-127.0.0.1}
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3000}
    network_mode: host
